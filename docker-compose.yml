services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: p5kproxy
      POSTGRES_USER: p5k
      POSTGRES_PASSWORD: p5k
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U p5k -d p5kproxy"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/p5kproxy
      DB_USER: p5k
      DB_PASSWORD: p5k
    # Upstreams are registered at runtime via /admin/applications (each app has its own
    # base_url). To reach a backend on the host (e.g. the cache-test-origin app on :8081)
    # register an application with base_url http://host.docker.internal:8081.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
