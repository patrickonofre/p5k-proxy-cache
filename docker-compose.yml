services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: p5kproxy
      POSTGRES_USER: p5k
      POSTGRES_PASSWORD: p5k
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U p5k -d p5kproxy"]
      interval: 5s
      timeout: 3s
      retries: 10

  upstream:
    # Demo origin API. httpbin's /uuid returns a fresh UUID on every call,
    # so once a rule caches it the UUID visibly "freezes" — proof the cache works.
    image: mccutchen/go-httpbin:v2.15.0

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/p5kproxy
      DB_USER: p5k
      DB_PASSWORD: p5k
      # Default = local go-httpbin. Override to test a public API, e.g.:
      #   PROXY_UPSTREAM_BASE_URL=https://api.github.com docker compose up -d
      PROXY_UPSTREAM_BASE_URL: ${PROXY_UPSTREAM_BASE_URL:-http://upstream:8080}
    ports:
      - "8080:8080"
