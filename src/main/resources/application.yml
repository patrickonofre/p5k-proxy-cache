spring:
  application:
    name: p5k-proxy-cache
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/p5kproxy}
    username: ${DB_USER:p5k}
    password: ${DB_PASSWORD:p5k}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

# Upstreams are not configured statically — each application registers its own base URL
# via /admin/applications and the request slug (first path segment) selects it.

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
